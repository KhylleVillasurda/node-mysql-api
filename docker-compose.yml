version: "3.9"

services:
  api:
    build:
      context: .
      target: production
    container_name: node-api
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-apiuser}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-node_boilerplate_api}
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-gmail}
      EMAIL_FROM: ${EMAIL_FROM}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - api-network

  db:
    image: mysql:8.0
    container_name: node-api-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER:-apiuser}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-node_boilerplate_api}
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - api-network

volumes:
  db-data:

networks:
  api-network:
    driver: bridge
